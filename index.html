    <style>
      :root {
        color-scheme: dark;
        --bg: #090014;
        --bg-2: #17002f;
        --bg-3: #06000f;
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.68);
        --soft: rgba(255, 255, 255, 0.1);
        --line: rgba(255, 255, 255, 0.18);
        --purple: #8b5cf6;
        --purple-2: #d7c5ff;
        --purple-3: #3d1177;
        --panel: rgba(25, 8, 48, 0.62);
        --panel-strong: rgba(36, 14, 66, 0.78);
        --shadow: 0 20px 70px rgba(0, 0, 0, 0.36);
        --radius-xl: 34px;
        --radius-lg: 28px;
        --radius-md: 22px;
        --radius-sm: 16px;
      }

      html[data-theme="amethyst"] {
        --bg: #120021;
        --bg-2: #2a0751;
        --panel: rgba(41, 12, 77, 0.64);
        --panel-strong: rgba(58, 20, 101, 0.8);
        --purple: #a78bfa;
        --purple-2: #eadcff;
      }

      html[data-theme="midnight"] {
        --bg: #06000f;
        --bg-2: #12002b;
        --bg-3: #06000f;
        --panel: rgba(16, 5, 34, 0.7);
        --panel-strong: rgba(26, 8, 55, 0.84);
        --purple: #7c3aed;
        --purple-2: #c8b6ff;
      }

      html[data-theme="light"] {
        color-scheme: light;
        --bg: #f7f1ff;
        --bg-2: #eadcff;
        --bg-3: #ffffff;
        --text: #190033;
        --muted: rgba(25, 0, 51, 0.7);
        --soft: rgba(95, 35, 176, 0.1);
        --line: rgba(92, 45, 145, 0.2);
        --purple: #6d28d9;
        --purple-2: #4c1d95;
        --purple-3: #d9c3ff;
        --panel: rgba(255, 255, 255, 0.62);
        --panel-strong: rgba(255, 255, 255, 0.84);
        --shadow: 0 20px 70px rgba(78, 36, 133, 0.18);
      }

      * {
        box-sizing: border-box;
        font-family:
          "Google Sans Flex",
          "Google Sans",
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-feature-settings: "ss01" 1;
        letter-spacing: 0;
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(
            circle at 12% 4%,
            rgba(139, 92, 246, 0.38),
            transparent 32rem
          ),
          radial-gradient(
            circle at 84% 12%,
            rgba(80, 21, 189, 0.34),
            transparent 28rem
          ),
          linear-gradient(145deg, var(--bg), var(--bg-2) 48%, var(--bg-3));
        color: var(--text);
      }

      body.modal-open {
        overflow: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input {
        color: inherit;
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .liquid-glass {
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.12),
            rgba(255, 255, 255, 0.04)
          ),
          var(--panel);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        backdrop-filter: blur(3px) saturate(175%);
        -webkit-backdrop-filter: blur(3px) saturate(175%);
      }

      .blog-app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .topbar-shell {
        position: sticky;
        top: 0;
        z-index: 50;
        width: 100%;
        padding: 14px clamp(12px, 2.8vw, 34px);
        background: transparent;
        pointer-events: none;
      }

      .topbar {
        width: 100%;
        min-height: 64px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0;
        border-radius: 999px;
        pointer-events: auto;
        background: transparent;
        border: 0;
        box-shadow: none;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }

      .topbar-left,
      .topbar-middle,
      .topbar-right {
        min-height: 64px;
        display: flex;
        align-items: center;
        border-radius: 999px;
      }

      .topbar-left {
        flex: 0 1 auto;
        min-width: 0;
        padding: 8px;
      }

      .topbar-middle {
        flex: 1 1 420px;
        justify-content: center;
        padding: 8px;
      }

      .topbar-right {
        flex: 0 0 auto;
        justify-content: flex-end;
        gap: 8px;
        padding: 8px;
      }

      .brand-link {
        min-width: 0;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 6px 12px 6px 8px;
        border-radius: 999px;
      }

      .brand-link img {
        width: 36px;
        height: 36px;
        border-radius: 12px;
      }

      .blog-title {
        overflow: hidden;
        font-size: clamp(1rem, 3.5vw, 1.28rem);
        font-weight: 760;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .nav-links {
        display: none;
        align-items: center;
        gap: 6px;
      }

      .nav-links a,
      .language-pill {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        border-radius: 999px;
        color: var(--muted);
        font-weight: 650;
      }

      .nav-links a:hover,
      .language-pill:hover,
      .icon-button:hover,
      .action-button:hover {
        background: rgba(255, 255, 255, 0.12);
        color: var(--text);
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .icon-button {
        width: 44px;
        height: 44px;
        display: inline-grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.13);
      }

      .icon {
        width: 20px;
        height: 20px;
        display: block;
      }

      .content {
        width: min(1600px, calc(100% - 28px));
        flex: 1;
        margin: 0 auto;
        padding: clamp(18px, 5vw, 58px) 0 46px;
      }

      .hero {
        display: grid;
        gap: 18px;
        margin-bottom: 26px;
      }

      .eyebrow {
        width: fit-content;
        margin: 0;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(139, 92, 246, 0.18);
        color: var(--purple-2);
        font-size: 0.88rem;
        font-weight: 720;
      }

      .hero h1 {
        max-width: 820px;
        margin: 0;
        font-size: clamp(2.4rem, 10vw, 6rem);
        line-height: 0.92;
        font-weight: 850;
      }

      .hero p {
        max-width: 700px;
        margin: 0;
        color: var(--muted);
        font-size: clamp(1rem, 2.4vw, 1.25rem);
        line-height: 1.65;
      }

      .hero-tools {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .search-field {
        min-height: 54px;
        width: min(100%, 680px);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 18px;
        border-radius: 999px;
      }

      .search-field input {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        background: transparent;
      }

      .topbar-search {
        width: 100%;
        max-width: 720px;
      }

      .topbar-search .search-field {
        width: 100%;
        min-height: 48px;
        background: rgba(255, 255, 255, 0.07);
        box-shadow: none;
      }

      .action-button {
        min-height: 54px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 18px;
        border-radius: 999px;
        background: rgba(139, 92, 246, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.14);
        font-weight: 720;
      }

      .layout {
        display: grid;
        gap: 18px;
      }

      .section-heading {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 14px;
        margin: 0 0 14px;
      }

      .section-heading h2 {
        margin: 0;
        font-size: clamp(1.4rem, 4vw, 2rem);
      }

      .section-heading a {
        color: var(--purple-2);
        font-weight: 720;
        white-space: nowrap;
      }

      .featured-card,
      .post-card,
      .compact-card,
      .settings-panel,
      .empty-state {
        border-radius: var(--radius-lg);
        animation: riseIn 0.55s ease both;
      }

      .featured-card {
        display: grid;
        gap: 20px;
        padding: clamp(16px, 3.4vw, 28px);
      }

      .featured-media,
      .post-media,
      .article-media {
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
      }

      .featured-media {
        aspect-ratio: 16 / 10;
        border-radius: 30px;
      }

      .featured-media img,
      .post-media img,
      .article-media img,
      .compact-card img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .post-copy {
        display: grid;
        gap: 12px;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 650;
      }

      .post-copy h3,
      .post-copy h2,
      .compact-card h3 {
        margin: 0;
        line-height: 1.12;
      }

      .post-copy h2 {
        font-size: clamp(1.8rem, 5vw, 3rem);
      }

      .post-copy h3 {
        font-size: clamp(1.18rem, 3vw, 1.55rem);
      }

      .post-copy p,
      .article-body {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .post-grid,
      .compact-list {
        display: grid;
        gap: 14px;
      }

      .post-card {
        overflow: hidden;
        cursor: pointer;
        transition:
          transform 0.22s ease,
          border-color 0.22s ease,
          background 0.22s ease;
      }

      .post-card:hover,
      .compact-card:hover,
      .featured-card:hover {
        transform: translateY(-3px);
        border-color: rgba(215, 197, 255, 0.38);
      }

      .post-media {
        aspect-ratio: 16 / 9;
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      }

      .post-card .post-copy {
        padding: 18px;
      }

      .compact-card {
        display: grid;
        grid-template-columns: 74px 1fr;
        gap: 13px;
        align-items: center;
        min-height: 96px;
        padding: 12px;
        cursor: pointer;
        transition:
          transform 0.22s ease,
          border-color 0.22s ease,
          background 0.22s ease;
      }

      .compact-card img {
        width: 74px;
        height: 74px;
        border-radius: 22px;
      }

      .compact-card h3 {
        display: -webkit-box;
        overflow: hidden;
        font-size: 1rem;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 0 11px;
        border-radius: 999px;
        background: rgba(139, 92, 246, 0.18);
        color: var(--purple-2);
        font-size: 0.86rem;
        font-weight: 720;
      }

      .article {
        max-width: 900px;
        display: grid;
        gap: 18px;
      }

      .article h1 {
        margin: 0;
        font-size: clamp(2rem, 7vw, 4rem);
        line-height: 1;
      }

      .article-media {
        aspect-ratio: 16 / 9;
        border-radius: var(--radius-xl);
      }

      .article-body {
        display: grid;
        gap: 14px;
        padding: clamp(18px, 3vw, 28px);
        border-radius: var(--radius-lg);
      }

      .article-body p {
        margin: 0;
      }

      .article-body h2,
      .article-body h3,
      .article-body h4 {
        margin: 6px 0 0;
        color: var(--text);
        line-height: 1.18;
      }

      .article-body h2 {
        font-size: clamp(1.55rem, 4vw, 2.2rem);
      }

      .article-body h3 {
        font-size: clamp(1.28rem, 3vw, 1.7rem);
      }

      .article-body h4 {
        font-size: 1.08rem;
      }

      .article-body a {
        color: var(--purple-2);
        font-weight: 760;
        text-decoration: underline;
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;
      }

      .article-body ul,
      .article-body ol {
        display: grid;
        gap: 8px;
        margin: 0;
        padding-left: 1.4rem;
      }

      .article-body blockquote {
        margin: 0;
        padding: 14px 16px;
        border-left: 3px solid var(--purple);
        border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        background: rgba(139, 92, 246, 0.12);
        color: var(--text);
      }

      .article-body pre,
      .article-body code {
        border-radius: 12px;
        background: rgba(15, 0, 34, 0.34);
        color: var(--text);
      }

      .article-body code {
        padding: 0.14em 0.4em;
      }

      .article-body pre {
        overflow-x: auto;
        margin: 0;
        padding: 14px;
      }

      .article-body pre code {
        padding: 0;
        background: transparent;
      }

      .article-body img {
        max-width: 100%;
        height: auto;
        display: block;
        border-radius: var(--radius-md);
      }

      .article-body figure {
        display: grid;
        gap: 8px;
        margin: 0;
      }

      .article-body figcaption {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .page-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(6, 0, 18, 0.55);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
      }

      .modal {
        width: min(520px, 100%);
        display: grid;
        gap: 18px;
        padding: 22px;
        border-radius: var(--radius-xl);
      }

      .modal header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .modal h2 {
        margin: 0;
      }

      .settings-panel {
        display: grid;
        gap: 12px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.06);
      }

      .settings-panel label,
      .settings-label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-weight: 700;
      }

      .settings-section-title {
        margin: 6px 0 0;
        font-size: 0.82rem;
        color: var(--purple-2);
        text-transform: uppercase;
        font-weight: 820;
      }

      .custom-dropdown {
        position: relative;
      }

      .dropdown-button {
        min-height: 50px;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 14px;
        border-radius: 20px;
        background: rgba(20, 4, 45, 0.72);
        border: 1px solid var(--line);
        color: var(--text);
      }

      .dropdown-options {
        position: absolute;
        inset: calc(100% + 8px) 0 auto 0;
        z-index: 4;
        display: none;
        gap: 6px;
        margin: 0;
        padding: 8px;
        list-style: none;
        border-radius: 22px;
      }

      .custom-dropdown[data-open="true"] .dropdown-options {
        display: grid;
      }

      .dropdown-option {
        min-height: 42px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        border-radius: 16px;
        color: var(--muted);
        cursor: pointer;
      }

      .dropdown-option[aria-selected="true"],
      .dropdown-option:hover {
        background: rgba(139, 92, 246, 0.22);
        color: var(--text);
      }

      .segmented-control {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .segment-button {
        min-height: 46px;
        padding: 0 12px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.14);
        color: var(--muted);
        font-weight: 740;
      }

      .segment-button[aria-pressed="true"] {
        background: rgba(139, 92, 246, 0.3);
        color: var(--text);
        border-color: rgba(215, 197, 255, 0.34);
      }

      .empty-state {
        padding: 24px;
        color: var(--muted);
      }

      .footer {
        width: min(1600px, calc(100% - 28px));
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin: 0 auto;
        padding: 26px 0 34px;
        color: var(--muted);
      }

      .footer-links {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
      }

      .footer-links a {
        color: var(--purple-2);
        font-weight: 700;
      }

      @media (min-width: 720px) {
        .nav-links {
          display: flex;
        }

        .layout {
          grid-template-columns: minmax(0, 1fr) 340px;
          align-items: start;
        }

        .post-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .featured-card {
          grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
          align-items: center;
        }
      }

      @media (max-width: 760px) {
        .topbar {
          flex-wrap: wrap;
          align-items: stretch;
        }

        .topbar-left,
        .topbar-right {
          min-height: 56px;
          flex: 1 1 calc(50% - 6px);
        }

        .topbar-middle {
          order: 3;
          min-height: 56px;
          flex-basis: 100%;
        }

        .nav-links,
        .language-pill {
          display: none;
        }
      }

      @media (max-width: 430px) {
        .topbar-left,
        .topbar-middle,
        .topbar-right {
          border-radius: 30px;
        }

        .brand-link {
          padding-right: 4px;
        }

        .blog-title {
          max-width: 118px;
        }

        .compact-card {
          grid-template-columns: 64px 1fr;
        }

        .compact-card img {
          width: 64px;
          height: 64px;
          border-radius: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          scroll-behavior: auto !important;
          transition: none !important;
        }
      }

      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      :focus-visible {
        outline: 3px solid rgba(215, 197, 255, 0.8);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <div class="blog-app" id="blog">
      <div class="topbar-shell">
        <nav class="topbar" aria-label="Munetios Blog">
          <div class="topbar-left liquid-glass">
            <a class="brand-link" href="#" data-route="home">
              <img
                src="https://www.munetios.com/favicon-new.ico"
                alt="Munetios"
                width="36"
                height="36"
              />
              <span class="blog-title">Munetios Blog</span>
            </a>
            <div class="nav-links">
              <a href="https://www.munetios.com" data-i18n="home">Home</a>
              <a href="https://www.munetios.com/about" data-i18n="about"
                >About</a
              >
              <a href="#/all" data-i18n="allPosts">All Posts</a>
            </div>
          </div>

          <div class="topbar-middle liquid-glass">

        };
      }

      let currentLanguage = getInitialLanguage();
      let currentTheme = getInitialTheme();
      let activeUtterance = null;

      function getInitialLanguage() {
        const saved = localStorage.getItem(LANGUAGE_KEY);
        if (SUPPORTED_LANGUAGES.includes(saved)) return saved;

        const browserLanguage = (navigator.language || "en")
          .slice(0, 2)
          .toLowerCase();
        const detected = SUPPORTED_LANGUAGES.includes(browserLanguage)
          ? browserLanguage
          : "en";
        localStorage.setItem(LANGUAGE_KEY, detected);
        return detected;
      }

      function t(key) {
        return ui[currentLanguage][key] || ui.en[key] || key;
      }

      function postContent(post) {
        return post.content[currentLanguage] || post.content.en;
      }

      function getInitialTheme() {
        const saved = localStorage.getItem(THEME_KEY);
        return SUPPORTED_THEMES.includes(saved) ? saved : "midnight";
      }

      function setTheme(theme) {
        if (!SUPPORTED_THEMES.includes(theme)) return;
        currentTheme = theme;
        localStorage.setItem(THEME_KEY, theme);
        applyTheme();
      }

      function applyTheme() {
        document.documentElement.dataset.theme = currentTheme;
      }

      function submitSearchFrom(inputId) {
        const input = document.getElementById(inputId);
        const query = input.value.trim();
        if (!query) return;
        input.blur();
        location.hash = `#/search?q=${encodeURIComponent(query)}`;
      }

      function setLanguage(language) {
        if (!SUPPORTED_LANGUAGES.includes(language)) return;
        stopReadAloud();
        currentLanguage = language;
        localStorage.setItem(LANGUAGE_KEY, language);
        document.documentElement.lang = language;
        applyStaticTranslations();
        handleHashChange();
      }

      function applyStaticTranslations() {
        document.title = t("heroTitle");
        document
          .querySelectorAll("[data-i18n]")
          .forEach((node) => (node.textContent = t(node.dataset.i18n)));
        document.getElementById("languageQuickBtn").textContent = t("langName");
        document.getElementById("topbarSearchInput").placeholder =
          t("searchPlaceholder");
        document
          .getElementById("settingsBtn")
          .setAttribute("aria-label", t("settings"));
        document
          .getElementById("settingsBtn")
          .setAttribute("title", t("settings"));
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      const ALLOWED_POST_TAGS = new Set([
        "A",
        "B",
        "BLOCKQUOTE",
        "BR",
        "CODE",
        "EM",
        "FIGCAPTION",
        "FIGURE",
        "H2",
        "H3",
        "H4",
        "HR",
        "I",
        "IMG",
        "LI",
        "OL",
        "P",
        "PRE",
        "SPAN",
        "STRONG",
        "U",
        "UL",
      ]);
      const BLOCK_POST_TAGS = new Set([
        "BLOCKQUOTE",
        "FIGURE",
        "H2",
        "H3",
        "H4",
        "HR",
        "IMG",
        "OL",
        "P",
        "PRE",
        "UL",
      ]);
      const URI_ATTRS = new Set(["href", "src"]);

      function isSafePostUrl(value) {
        const url = String(value || "").trim();
        if (!url) return false;
        if (
          url.startsWith("#") ||
          url.startsWith("/") ||
          url.startsWith("./")
        ) {
          return true;
        }

        try {
          return ["http:", "https:", "mailto:"].includes(
            new URL(url, location.origin).protocol,
          );
        } catch {
          return false;
        }
      }

      function sanitizePostHtml(value) {
        const template = document.createElement("template");
        template.innerHTML = String(value);
        const walker = document.createTreeWalker(
          template.content,
          NodeFilter.SHOW_ELEMENT,
        );
        const nodes = [];

        while (walker.nextNode()) nodes.push(walker.currentNode);

        nodes.reverse().forEach((node) => {
          if (!ALLOWED_POST_TAGS.has(node.tagName)) {
            node.replaceWith(...Array.from(node.childNodes));
            return;
          }

          Array.from(node.attributes).forEach((attr) => {
            const name = attr.name.toLowerCase();
            const value = attr.value;
            const allowed =
              (node.tagName === "A" &&
                ["href", "title", "target", "rel"].includes(name)) ||
              (node.tagName === "IMG" &&
                ["src", "alt", "title", "width", "height", "loading"].includes(
                  name,
                )) ||
              (node.tagName === "CODE" && name === "class");

            if (!allowed || (URI_ATTRS.has(name) && !isSafePostUrl(value))) {
              node.removeAttribute(attr.name);
            }
          });

          if (node.tagName === "A" && node.hasAttribute("href")) {
            node.setAttribute("target", "_self");
            node.setAttribute("rel", "noopener noreferrer");
          }

          if (node.tagName === "IMG") {
            if (!node.hasAttribute("alt")) node.setAttribute("alt", "");
            node.setAttribute("loading", "lazy");
          }
        });

        return template.innerHTML.trim();
      }

      function postBodyBlock(paragraph) {
        const html = sanitizePostHtml(paragraph);
        const template = document.createElement("template");
        template.innerHTML = html;
        const firstElement = Array.from(template.content.childNodes).find(
          (node) =>
            node.nodeType === Node.ELEMENT_NODE ||
            (node.nodeType === Node.TEXT_NODE && node.textContent.trim()),
        );
        const isBlock =
          firstElement?.nodeType === Node.ELEMENT_NODE &&
          BLOCK_POST_TAGS.has(firstElement.tagName);

        return isBlock ? html : `<p>${html}</p>`;
      }

      function stripPostHtml(value) {
        const template = document.createElement("template");
        template.innerHTML = sanitizePostHtml(value);
        return template.content.textContent || "";
      }

      function routePost(post) {
        location.hash = `#/post/${encodeURIComponent(post.id)}`;
      }

      function postCard(post, mode = "grid") {
        const content = postContent(post);
        const tags = content.tags
          .slice(0, 3)
          .map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`)
          .join("");

        if (mode === "compact") {
          return `
                  <article class="compact-card liquid-glass" tabindex="0" role="button" data-post-id="${post.id}">
                    <img src="${post.image}" alt="${escapeHtml(content.title)}" loading="lazy" />
                    <div class="post-copy">
                      <h3>${escapeHtml(content.title)}</h3>
                      <div class="meta"><span>${post.date}</span></div>
                    </div>
                  </article>
                `;
        }

        return `
                <article class="post-card liquid-glass" tabindex="0" role="button" data-post-id="${post.id}">
                  <div class="post-media">
                    <img src="${post.image}" alt="${escapeHtml(content.title)}" loading="lazy" />
                  </div>
                  <div class="post-copy">
                    <div class="meta"><span>${post.date}</span></div>
                    <h3>${escapeHtml(content.title)}</h3>
                    <p>${escapeHtml(content.excerpt)}</p>
                    <div class="tags">${tags}</div>
                  </div>
                </article>
              `;
      }

      function bindPostCards(root = document) {
        root.querySelectorAll("[data-post-id]").forEach((card) => {
          const post = blogPosts.find(
            (item) => item.id === card.dataset.postId,
          );
          if (!post) return;
          card.addEventListener("click", () => routePost(post));
          card.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              routePost(post);
            }
          });
        });
      }

      function renderHomePage() {
        const latest = blogPosts[0];
        const latestContent = postContent(latest);
        const featuredTags = latestContent.tags
          .map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`)
          .join("");
        const recentPosts = blogPosts.slice(1, 7);
        const sidePosts = blogPosts.slice(0, 5);

        document.getElementById("homePage").setAttribute("data-page", "home");
        document.getElementById("homePage").innerHTML = `
                <section class="hero">
                  <p class="eyebrow">${t("heroKicker")}</p>
                  <h1>${t("heroTitle")}</h1>
                  <p>${t("heroText")}</p>
                </section>

                <section class="layout">
                  <div>
                    <div class="section-heading">
                      <h2>${t("latest")}</h2>
                    </div>
                    <article class="featured-card liquid-glass">
                      <div class="featured-media">
                        <img src="${latest.image}" alt="${escapeHtml(latestContent.title)}" />
                      </div>
                      <div class="post-copy">
                        <div class="meta"><span>${latest.date}</span></div>
                        <h2>${escapeHtml(latestContent.title)}</h2>
                        <p>${escapeHtml(latestContent.excerpt)}</p>
                        <div class="tags">${featuredTags}</div>
                        <div class="page-actions">
                          <button class="action-button liquid-glass" type="button" id="featuredReadBtn">${t("readMore")}</button>
                          <a class="action-button liquid-glass" href="#/all">${t("seeAll")}</a>
                        </div>
                      </div>
                    </article>

                    <div class="section-heading" style="margin-top: 24px">
                      <h2>${t("explore")}</h2>
                      <a href="#/all">${t("seeAll")}</a>
                    </div>
                    <div class="post-grid">${recentPosts.map((post) => postCard(post)).join("")}</div>
                  </div>

                  <aside>
                    <div class="section-heading">
                      <h2>${t("recent")}</h2>
                    </div>
                    <div class="compact-list">${sidePosts.map((post) => postCard(post, "compact")).join("")}</div>
                  </aside>
                </section>
              `;

        document
          .getElementById("featuredReadBtn")
          .addEventListener("click", () => {
            routePost(latest);
          });
        bindPostCards();
      }

      function renderAllPage() {
        document.getElementById("homePage").setAttribute("data-page", "all");
        document.getElementById("homePage").innerHTML = `
                <section class="hero">
                  <p class="eyebrow">${blogPosts.length} ${t("allPosts")}</p>
                  <h1>${t("allPosts")}</h1>
                  <p>${t("heroText")}</p>
                </section>
                <div class="post-grid">${blogPosts.map((post) => postCard(post)).join("")}</div>
                <div class="page-actions" style="margin-top: 22px">
                  <a class="action-button liquid-glass" href="#">${t("backHome")}</a>
                </div>
              `;
        bindPostCards();
      }

      function renderPostPage(postId) {
        const post = blogPosts.find((item) => item.id === postId);
        if (!post) {
          document.getElementById("homePage").innerHTML = `
                  <section class="empty-state liquid-glass">
                    <h1>${t("postNotFound")}</h1>
                    <a class="action-button liquid-glass" href="#">${t("backHome")}</a>
                  </section>
                `;
          return;
        }

        const content = postContent(post);
        const tags = content.tags
          .map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`)
          .join("");
        const body = content.body
          .map((paragraph) => postBodyBlock(paragraph))
          .join("");

        document.getElementById("homePage").setAttribute("data-page", "post");
        document.getElementById("homePage").innerHTML = `
                <article class="article">
                  <div class="page-actions">
                    <a class="action-button liquid-glass" href="#">${t("backHome")}</a>
                    <button class="action-button liquid-glass" type="button" id="shareBtn">${t("share")}</button>
                    <button class="action-button liquid-glass" type="button" id="readAloudBtn" aria-live="polite">${t("readAloud")}</button>
                  </div>
                  <h1>${escapeHtml(content.title)}</h1>
                  <div class="meta"><span>${post.date}</span></div>
                  <div class="article-media">
                    <img src="${post.image}" alt="${escapeHtml(content.title)}" />
                  </div>
                  <div class="article-body liquid-glass">${body}</div>
                  <div class="tags">${tags}</div>
                </article>
              `;
        document
          .getElementById("shareBtn")
          .addEventListener("click", () => showShareModal(post));
        document
          .getElementById("readAloudBtn")
          .addEventListener("click", () => toggleReadAloud(post));
      }

      function renderSearchResultsPage(rawQuery) {
        const query = rawQuery.trim().toLowerCase();
        const results = blogPosts.filter((post) => {
          const content = postContent(post);
          return [
            content.title,
            content.excerpt,
            content.body.join(" "),
            content.tags.join(" "),
          ]
            .join(" ")
            .toLowerCase()
            .includes(query);
        });

        document.getElementById("homePage").setAttribute("data-page", "search");
        document.getElementById("homePage").innerHTML = `
                <section class="hero">
                  <p class="eyebrow">${t("resultsFor")} "${escapeHtml(rawQuery)}"</p>
                  <h1>${t("searchResults")}</h1>
                </section>
                ${
                  results.length
                    ? `<div class="post-grid">${results.map((post) => postCard(post)).join("")}</div>`
                    : `<div class="empty-state liquid-glass">${t("noResults")}</div>`
                }
                <div class="page-actions" style="margin-top: 22px">
                  <a class="action-button liquid-glass" href="#">${t("backHome")}</a>
                </div>
              `;
        bindPostCards();
      }

      function getSpeechLanguage() {
        if (currentLanguage === "es") return "es-ES";
        if (currentLanguage === "pt") return "pt-PT";
        return "en-US";
      }

      function stopReadAloud() {
        if ("speechSynthesis" in window) {
          window.speechSynthesis.cancel();
        }
        activeUtterance = null;
        const button = document.getElementById("readAloudBtn");
        if (button) {
          button.textContent = t("readAloud");
          button.setAttribute("aria-pressed", "false");
        }
      }

      function toggleReadAloud(post) {
        if (!("speechSynthesis" in window)) return;
        const button = document.getElementById("readAloudBtn");
        if (window.speechSynthesis.speaking || activeUtterance) {
          stopReadAloud();
          return;
        }

        const content = postContent(post);
        const text = [
          content.title,
          post.date,
          content.excerpt,
          content.body.map(stripPostHtml).join(" "),
        ].join(". ");

        activeUtterance = new SpeechSynthesisUtterance(text);
        activeUtterance.lang = getSpeechLanguage();
        activeUtterance.rate = 0.95;
        activeUtterance.pitch = 1;
        activeUtterance.onend = stopReadAloud;
        activeUtterance.onerror = stopReadAloud;

        if (button) {
          button.textContent = t("stopReading");
          button.setAttribute("aria-pressed", "true");
        }
        window.speechSynthesis.speak(activeUtterance);
      }

      function bindCustomDropdown(dropdownId, buttonId, valueId, onSelect) {
        const dropdown = document.getElementById(dropdownId);
        const button = document.getElementById(buttonId);
        const value = document.getElementById(valueId);
        const options = Array.from(
          dropdown.querySelectorAll("[role='option']"),
        );

        function setOpen(open) {
          dropdown.dataset.open = String(open);
          button.setAttribute("aria-expanded", String(open));
          if (open) {
            const selected =
              options.find(
                (option) => option.getAttribute("aria-selected") === "true",
              ) || options[0];
            selected.focus();
          }
        }

        function choose(option) {
          options.forEach((item) =>
            item.setAttribute("aria-selected", String(item === option)),
          );
          value.textContent = option.textContent;
          setOpen(false);
          onSelect(option.dataset.value);
        }

        button.addEventListener("click", () => {
          setOpen(dropdown.dataset.open !== "true");
        });
        button.addEventListener("keydown", (event) => {
          if (
            event.key === "ArrowDown" ||
            event.key === "Enter" ||
            event.key === " "
          ) {
            event.preventDefault();
            setOpen(true);
          }
        });
        options.forEach((option, index) => {
          option.addEventListener("click", () => choose(option));
          option.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              choose(option);
            }
            if (event.key === "ArrowDown") {
              event.preventDefault();
              options[(index + 1) % options.length].focus();
            }
            if (event.key === "ArrowUp") {
              event.preventDefault();
              options[(index - 1 + options.length) % options.length].focus();
            }
            if (event.key === "Escape") {
              setOpen(false);
              button.focus();
            }
          });
        });
      }

      function showSettingsModal() {
        showModal(`
                <div class="modal liquid-glass" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
                  <header>
                    <h2 id="settingsTitle">${t("settings")}</h2>
                    <button class="icon-button" type="button" data-close-modal aria-label="${t("close")}">
                      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M6 6l12 12M18 6 6 18" />
                      </svg>
                    </button>
                  </header>
                  <div class="settings-panel">
                    <h3 class="settings-section-title">${t("language")}</h3>
                    <div class="settings-label">
                      <span id="languageDropdownLabel">${t("language")}</span>
                      <div class="custom-dropdown" id="languageDropdown">
                        <button class="dropdown-button" type="button" id="languageDropdownButton" aria-haspopup="listbox" aria-expanded="false" aria-labelledby="languageDropdownLabel languageDropdownValue">
                          <span id="languageDropdownValue">${t("langName")}</span>
                          <span aria-hidden="true">⌄</span>
                        </button>
                        <ul class="dropdown-options liquid-glass" role="listbox" id="languageDropdownList" aria-labelledby="languageDropdownLabel">
                          <li class="dropdown-option" role="option" tabindex="-1" data-value="en" aria-selected="${currentLanguage === "en"}">English</li>
                          <li class="dropdown-option" role="option" tabindex="-1" data-value="es" aria-selected="${currentLanguage === "es"}">Español</li>
                          <li class="dropdown-option" role="option" tabindex="-1" data-value="pt" aria-selected="${currentLanguage === "pt"}">Português</li>
                        </ul>
                      </div>
                    </div>
                    <div class="meta">${t("languageHint")}</div>
                    <h3 class="settings-section-title">${t("theme")}</h3>
                    <div class="segmented-control" role="group" aria-label="${t("theme")}">
                      <button class="segment-button" type="button" data-theme-option="midnight" aria-pressed="${currentTheme === "midnight"}">${t("midnight")}</button>
                      <button class="segment-button" type="button" data-theme-option="amethyst" aria-pressed="${currentTheme === "amethyst"}">${t("amethyst")}</button>
                      <button class="segment-button" type="button" data-theme-option="light" aria-pressed="${currentTheme === "light"}">${t("light")}</button>
                    </div>
                    <div class="meta">${t("themeHint")}</div>
                  </div>
                </div>
              `);
        bindCustomDropdown(
          "languageDropdown",
          "languageDropdownButton",
          "languageDropdownValue",
          (language) => {
            setLanguage(language);
            closeModal();
          },
        );
        document.querySelectorAll("[data-theme-option]").forEach((button) => {
          button.addEventListener("click", () => {
            setTheme(button.dataset.themeOption);
            showSettingsModal();
          });
        });
      }

      function showShareModal(post) {
        const content = postContent(post);
        const url = `${location.origin}${location.pathname}#/post/${encodeURIComponent(post.id)}`;
        showModal(`
                <div class="modal liquid-glass" role="dialog" aria-modal="true" aria-labelledby="shareTitle">
                  <header>
                    <h2 id="shareTitle">${t("share")}</h2>
                    <button class="icon-button" type="button" data-close-modal aria-label="${t("close")}">
                      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M6 6l12 12M18 6 6 18" />
                      </svg>
                    </button>
                  </header>
                  <div class="settings-panel">
                    <strong>${escapeHtml(content.title)}</strong>
                    <button class="action-button liquid-glass" type="button" id="copyLinkBtn">${t("copyLink")}</button>
                    <div class="meta" id="copyStatus" hidden>${t("linkCopied")}</div>
                    <a class="action-button liquid-glass" href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}">${t("share")} Facebook</a>
                    <a class="action-button liquid-glass" href="https://chatgpt.com/?q=${encodeURIComponent(url)}">${t("share")} ChatGPT</a>
                  </div>
                </div>
              `);
        document.getElementById("copyLinkBtn").addEventListener("click", () => {
          navigator.clipboard.writeText(url).then(() => {
            document.getElementById("copyStatus").hidden = false;
          });
        });
      }

      function showSearchModal() {
        showModal(`
                <form class="modal liquid-glass" role="search" id="modalSearchForm">
                  <header>
                    <h2>${t("search")}</h2>
                    <button class="icon-button" type="button" data-close-modal aria-label="${t("close")}">
                      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M6 6l12 12M18 6 6 18" />
                      </svg>
                    </button>
                  </header>
                  <label class="search-field liquid-glass" style="width: 100%">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-4.35-4.35m1.35-5.15a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" />
                    </svg>
                    <input id="modalSearchInput" type="search" autocomplete="off" placeholder="${t("searchPlaceholder")}" />
                  </label>
                  <button class="action-button liquid-glass" type="submit">${t("search")}</button>
                </form>
              `);
        const input = document.getElementById("modalSearchInput");
        input.focus();
        document
          .getElementById("modalSearchForm")
          .addEventListener("submit", (event) => {
            event.preventDefault();
            const query = input.value.trim();
            if (!query) return;
            closeModal();
            location.hash = `#/search?q=${encodeURIComponent(query)}`;
          });
      }

      function showModal(markup) {
        closeModal();
        const wrapper = document.createElement("div");
        wrapper.className = "modal-backdrop";
        wrapper.id = "modalBackdrop";
        wrapper.innerHTML = markup;
        document.body.appendChild(wrapper);
        document.body.classList.add("modal-open");
        wrapper.addEventListener("click", (event) => {
          if (
            event.target === wrapper ||
            event.target.closest("[data-close-modal]")
          ) {
            closeModal();
          }
        });
      }

      function closeModal() {
        const modal = document.getElementById("modalBackdrop");
        if (modal) modal.remove();
        document.body.classList.remove("modal-open");
      }

      function handleHashChange() {
        const hash = location.hash || "#";
        if (hash === "#" || hash === "") {
          renderHomePage();
          return;
        }
        if (hash.startsWith("#/all")) {
          renderAllPage();
          return;
        }
        if (hash.startsWith("#/post/")) {
          renderPostPage(decodeURIComponent(hash.slice(7)));
          return;
        }
        if (hash.startsWith("#/search")) {
          const params = new URLSearchParams(hash.split("?")[1] || "");
          renderSearchResultsPage(params.get("q") || "");
          return;
        }
        renderHomePage();
      }

      document.addEventListener("DOMContentLoaded", () => {
        document.documentElement.lang = currentLanguage;
        applyTheme();
        applyStaticTranslations();
        document
          .getElementById("settingsBtn")
          .addEventListener("click", showSettingsModal);
        document
          .getElementById("topbarSearchForm")
          .addEventListener("submit", (event) => {
            event.preventDefault();
            submitSearchFrom("topbarSearchInput");
          });
        document
          .getElementById("languageQuickBtn")
          .addEventListener("click", showSettingsModal);
        window.addEventListener("hashchange", handleHashChange);
        handleHashChange();
      });
    </script>
  </body>
</html>
